version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://workora:workora_pass@postgres:5432/workorajobs?schema=public
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - workora_net

  postgres:
    image: postgres:16-alpine
    container_name: workora_postgres
    environment:
      POSTGRES_USER: workora
      POSTGRES_PASSWORD: workora_pass
      POSTGRES_DB: workorajobs
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workora -d workorajobs"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - workora_net

  redis:
    image: redis:7-alpine
    container_name: workora_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - workora_net

networks:
  workora_net:
    driver: bridge

volumes:
  pgdata:
  redisdata:
