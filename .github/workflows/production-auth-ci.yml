name: Production Authentication CI/CD Validation

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate-auth:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: workora
          POSTGRES_PASSWORD: workora_password
          POSTGRES_DB: workora_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Verify Environment & Secret Configurations
        run: npx tsx -e "import { EnvValidator } from './src/lib/config/env-validator'; EnvValidator.validate();"
        env:
          DATABASE_URL: "postgresql://workora:workora_password@localhost:5432/workora_test_db?schema=public"
          JWT_SECRET: "ci-testing-super-secret-jwt-key-32-chars-long!"
          REDIS_URL: "redis://localhost:6379"
          NODE_ENV: "production"

      - name: Run Prisma Migration & Generation
        run: |
          npx prisma generate
          npx prisma db push --skip-generate
        env:
          DATABASE_URL: "postgresql://workora:workora_password@localhost:5432/workora_test_db?schema=public"

      - name: Typecheck TypeScript Codebase
        run: npx tsc --noEmit

      - name: Run Unit Tests with Coverage
        run: npm test -- --testPathPattern=tests/unit --coverage

      - name: Build Production Next.js Bundle
        run: npm run build
        env:
          DATABASE_URL: "postgresql://workora:workora_password@localhost:5432/workora_test_db?schema=public"
          JWT_SECRET: "ci-testing-super-secret-jwt-key-32-chars-long!"

      - name: Docker Build Sanity Check
        run: docker build -t workora-jobs-auth:latest .
