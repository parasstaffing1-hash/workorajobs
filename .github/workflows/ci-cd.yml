name: WorkoraJobs CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run Type Check & Lint
        run: npx tsc --noEmit

      - name: Run Production Next.js Build
        run: npm run build
        env:
          DATABASE_URL: "postgresql://workora:workora_pass@localhost:5432/workorajobs?schema=public"

      - name: Build Docker Image
        run: docker build -t workorajobs:latest .
